<div class="card bg-dark text-white border-secondary shadow-lg">
      <div class="card-header border-secondary d-flex justify-content-between align-items-center py-3">
        <div>
          <h5 class="card-title mb-0 text-success flex items-center gap-2">
            <span class="spinner-grow spinner-grow-sm text-success" role="status"></span>
            مراقبة الطلبات اللحظية (Live Workspace)
          </h5>
          <small class="text-muted">تحديثات تلقائية قادمة من المطبخ والإنترنت</small>
        </div>
        
        <div class="btn-group btn-group-sm" role="group" aria-label="Order Channels">
          <button (click)="setChannel('ALL')" [class.active]="selectedChannel() === 'ALL'" class="btn btn-outline-secondary">الكل</button>
          <button (click)="setChannel('Walk-in')" [class.active]="selectedChannel() === 'Walk-in'" class="btn btn-outline-info">صالة</button>
          <button (click)="setChannel('Delivery')" [class.active]="selectedChannel() === 'Delivery'" class="btn btn-outline-warning">توصيل</button>
          <button (click)="setChannel('Online')" [class.active]="selectedChannel() === 'Online'" class="btn btn-outline-danger">أونلاين</button>
        </div>
      </div>



      <!-- card -->
      <div class="card-body" style="max-height: 500px; overflow-y: auto;">
        
        <div *ngIf="filteredOrders().length === 0" class="text-center py-5 text-muted">
          <i class="bi bi-inbox fs-1 d-block mb-2"></i>
          لا توجد طلبات نشطة حالياً في هذا القسم.
        </div>

        <div class="row g-3">
          <div *ngFor="let order of filteredOrders(); trackBy: trackByOrderId" class="col-md-6 col-lg-4">
            <div class="card bg-black border-secondary h-100 transition-all hover-glow" 
                 [class.border-success]="order.status === 'Ready'"
                 [class.border-warning]="order.status === 'Preparing'">
              
              <div class="card-body d-flex flex-column justify-content-between">
                <div>
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="font-monospace fw-bold text-success">{{ order.id }}</span>
                    <span [ngClass]="getChannelClass(order.channel)" class="badge">
                      {{ order.channel }}
                    </span>
                  </div>
                  <p class="card-text text-light small mb-3">{{ order.item }}</p>
                </div>


                <div class="pt-2 border-top border-secondary d-flex justify-content-between align-items-center mt-auto">
                  <span class="fw-bold text-muted small">{{ order.amount | currency:'USD' }}</span>
                  <span [ngClass]="getStatusClass(order.status)" class="badge">
                    {{ order.status }}
                  </span>
                </div>
                <div class="mt-3 d-flex gap-1">
                  <button *ngIf="order.status === 'Received'" 
                          (click)="changeStatus(order.id, 'Preparing')" 
                          class="btn btn-sm btn-outline-warning w-100 py-1" style="font-size: 10px;">
                    بدء التحضير
                  </button>
                  <button *ngIf="order.status === 'Preparing'" 
                          (click)="changeStatus(order.id, 'Ready')" 
                          class="btn btn-sm btn-outline-success w-100 py-1" style="font-size: 10px;">
                    جاهز للتسليم
                  </button>
                </div>

              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
